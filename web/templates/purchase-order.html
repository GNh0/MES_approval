<div class="body-inner">
    <p class="center">아래와 같이 발주하고자 하오니 검토 후 재가 바랍니다.</p>
    <div class="gap"></div>
    <p class="center">- 아 래 -</p>

    <div class="section-title">1. 발주정보</div>
    <table class="body-table" style="width:100%;border-collapse:collapse;table-layout:fixed;">
        <thead>
            <tr>
                <th style="width:20%;">발주번호</th>
                <th style="width:20%;">외주처</th>
                <th style="width:20%;">주소</th>
                <th style="width:20%;">담당자</th>
                <th style="width:20%;">연락처</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{PURNUM}}</td>
                <td>{{CUSTNM}}</td>
                <td>{{CUSTADDR}}</td>
                <td>{{MANAGER}}</td>
                <td>{{TEL}}</td>
            </tr>
        </tbody>
    </table>

    <div class="section-title">2. 상세내역</div>
    <table class="body-table" data-calc-table="purchaseDetail" style="width:100%;border-collapse:collapse;table-layout:fixed;">
        <thead>
            <tr>
                <th style="width:45px;">순번</th>
                <th style="width:70px;">구분</th>
                <th style="width:90px;">품명</th>
                <th style="width:90px;">규격</th>
                <th style="width:70px;">용도</th>
                <th style="width:70px;">납기일</th>
                <th style="width:55px;">수량</th>
                <th style="width:45px;">단위</th>
                <th style="width:55px;">단가</th>
                <th style="width:70px;">공급액</th>
                <th style="width:70px;">부가세</th>
                <th style="width:70px;">합계액</th>
            </tr>
        </thead>
        <tbody>
            {{DETAIL_ROWS}}
        </tbody>
    </table>
</div>
